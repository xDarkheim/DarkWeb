<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Error</title>
	<style>
		*, *::before, *::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}
		body {
			background-color: #0d0c0b;
			background-image:
				radial-gradient(ellipse at 50% 0%, rgba(195,91,67,0.12) 0%, transparent 60%);
			font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
			color: #c9b49a;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		.error-wrapper {
			width: 100%;
			max-width: 580px;
			text-align: center;
		}
		.error-icon {
			width: 72px;
			height: 72px;
			margin: 0 auto 24px;
			border-radius: 50%;
			background: rgba(195,91,67,0.15);
			border: 2px solid rgba(195,91,67,0.4);
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.error-icon svg {
			width: 36px;
			height: 36px;
			fill: #c35b43;
		}
		.error-card {
			background: #1a1410;
			border: 1px solid #2a1e1b;
			border-top: 3px solid #c35b43;
			border-radius: 4px;
			padding: 36px 40px 32px;
			box-shadow: 0 8px 40px rgba(0,0,0,0.6);
		}
		.error-title {
			font-size: 13px;
			letter-spacing: 3px;
			text-transform: uppercase;
			color: #c35b43;
			font-weight: 700;
			margin-bottom: 16px;
		}
		.error-divider {
			width: 40px;
			height: 2px;
			background: linear-gradient(90deg, transparent, #c35b43, transparent);
			margin: 0 auto 20px;
		}
		.error-message {
			font-size: 15px;
			line-height: 1.7;
			color: #a89070;
		}
		.error-back {
			display: inline-block;
			margin-top: 28px;
			padding: 10px 28px;
			background: rgba(195,91,67,0.12);
			border: 1px solid rgba(195,91,67,0.35);
			border-radius: 3px;
			color: #ffaf43;
			font-size: 13px;
			letter-spacing: 1px;
			text-transform: uppercase;
			text-decoration: none;
			transition: background .2s, border-color .2s;
		}
		.error-back:hover {
			background: rgba(195,91,67,0.25);
			border-color: #c35b43;
		}
	</style>
</head>
<body>
	<div class="error-wrapper">
		<div class="error-icon">
			<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
				<path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
			</svg>
		</div>
		<div class="error-card">
			<div class="error-title">Error</div>
			<div class="error-divider"></div>
			<div class="error-message">{ERROR_MESSAGE}</div>
			<a class="error-back" href="javascript:history.back()">&#8592; Go Back</a>
		</div>
	</div>
</body>
</html>
