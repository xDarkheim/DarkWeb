services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cms_darkcore
    restart: unless-stopped
    expose:
      - "8081"
    # ── Local development (no reverse proxy) ─────────────────────────────────
    # Uncomment the block below to access the site at http://localhost:8081
    # and comment out the `networks` key + the `networks:` section at the bottom.
    # ports:
    #   - "8081:8081"
    # ─────────────────────────────────────────────────────────────────────────
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www/html          # project root — Apache DocumentRoot is /var/www/html/public
    env_file:
      - ./docker/config.env
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - COMPOSER_ALLOW_SUPERUSER=1
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# The `proxy` external network must exist on the Docker host before `docker compose up`.
# Create it once with:  docker network create proxy
# See docs/deployment.md for full reverse-proxy setup instructions.
networks:
  proxy:
    external: true
