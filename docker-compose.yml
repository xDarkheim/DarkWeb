services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cms_darkweb
    restart: unless-stopped
    expose:
      - "8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www/html          # full project mounted into Apache root
    env_file:
      - ./docker/config.env
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - COMPOSER_ALLOW_SUPERUSER=1
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
