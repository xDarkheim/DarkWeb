; Xdebug 3 — mode controlled by docker_xdebug_mode in cms.json.
; The entrypoint exports XDEBUG_MODE env var which Xdebug reads natively.
; Possible values: off, debug, profile, trace (or comma-separated combos).

xdebug.mode=off
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.start_with_request=yes
xdebug.idekey=PHPSTORM
xdebug.log_level=0

